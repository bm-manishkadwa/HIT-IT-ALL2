
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Game name -->
    <title>hit-it-all</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000000;
            width: 100%;
            height: 100%;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
        }

        canvas {
            display: block;
        }
    </style>
    <script src="phaser.js"></script>
    <script src="uieditor.js"></script>
    <script src="scenes/start.js"></script>
    <script src="scenes/game.js"></script>
    <script src="scenes/end.js"></script>
</head>

<body>
    <script>
        function getBaseGameSize() {
            const isLandscape = window.innerWidth > window.innerHeight;
            return isLandscape
                ? { width: 1920, height: 1080 }
                : { width: 1080, height: 1920 };
        }


        // Dynamic configuration for Hit It All. Change these values only.
        window.HIT_IT_ALL_SETTINGS = {
            gameplay: {
                targetScore: null,
                targetScoreMin: 10,
                targetScoreMax: 40,
                timerDuration: 60,
                maxWickets: 1,
                nextBallDelay: 3000,
                ballTypes: ['FULL_TOSS', 'BOUNCER', 'YORKER', 'GOOD_LENGTH', 'SLOWER', 'SWING'],
                wicketHitChance: 45,
                handPointerDuration: 3000,
                handSwipeDistancePortrait: 190,
                handSwipeDistanceLandscape: 260
            },
            scoring: {
                powerRun: 6,
                normalRun: 4,
                defenceRun: 1,
                perfectTimingWindow: 0.075,
                goodTimingWindow: 0.15,
                okayTimingWindow: 0.24
            },
            delivery: {
                speeds: { FULL_TOSS: 720, BOUNCER: 680, YORKER: 620, GOOD_LENGTH: 760, SLOWER: 980, SWING: 820 },
                idealHitTimes: { FULL_TOSS: 0.72, BOUNCER: 0.86, YORKER: 0.90, GOOD_LENGTH: 0.82, SLOWER: 0.84, SWING: 0.83 },
                bounceHeight: {
                    portrait: { FULL_TOSS: 0, BOUNCER: 170, YORKER: 22, GOOD_LENGTH: 62, SLOWER: 48, SWING: 72 },
                    landscape: { FULL_TOSS: 0, BOUNCER: 130, YORKER: 15, GOOD_LENGTH: 46, SLOWER: 36, SWING: 58 }
                }
            },
            players: {
                batsman: { portrait: { width: 164, height: 255 }, landscape: { width: 174, height: 270 } },
                bowler: { portrait: { width: 72, height: 258 }, landscape: { width: 76, height: 273 } },
                bowlerHand: 'LEFT'
            },
            countdown: { enabled: false, steps: ['3', '2', '1', 'GO!'], firstDelay: 300, stepDuration: 700, goHold: 400 },
            audio: { enabled: true, crowd: true, ballHit: true, wicket: true, win: true, lose: true, crowdVolume: 0.28, sfxVolume: 0.9, resultVolume: 1 },
            effects: { cameraShake: true, impactFlash: true, showShotFeedback: true, endButtonPulse: true },
            startScene: { tapToStart: true },
            endScene: { restartOnDownloadButton: true, buttonPulseDuration: 1100, buttonPulseAlpha: 0.82 }
        };

        const baseGameSize = getBaseGameSize();
        const config = {
            type: Phaser.AUTO,
            width: baseGameSize.width,
            height: baseGameSize.height,
            parent: "game-container",
            backgroundColor: "#000",
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH,
            },
            scene: [Start, Game, End],
        };

        window.addEventListener("load", () => {
            if (typeof Phaser === "undefined") {
                console.error("Phaser is NOT loaded. Check inline Phaser code.");
                return;
            }
            new Phaser.Game(config);
        });

        window.addEventListener("orientationchange", () => {
            window.dispatchEvent(new Event("resize"));
        });
    </script>
    <div id="game-container"></div>
</body>

</html>
